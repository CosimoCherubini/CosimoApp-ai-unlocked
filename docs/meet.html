<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel AI — Meet Me There</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a56db 0%, #0e3a8a 100%);
      color: white;
      text-align: center;
      padding: 2.5rem 1rem 3.5rem;
      position: relative;
    }
    header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.4rem; }
    header p  { font-size: 1rem; opacity: 0.85; }
    header .back {
      position: absolute;
      top: 1.25rem; left: 1.5rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 0.35rem 0.8rem;
    }
    header .back:hover { background: rgba(255,255,255,0.1); }

    /* ── Form card ── */
    .form-wrap {
      max-width: 700px;
      margin: -1.75rem auto 2rem;
      padding: 0 1.25rem;
    }
    .form-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 1.75rem;
    }
    .form-card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
    }

    /* Friends list */
    .friends-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .friend-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.5rem;
      align-items: center;
    }
    .friend-row input {
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      color: #1a202c;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .friend-row input:focus { border-color: #1a56db; }
    .friend-row input::placeholder { color: #a0aec0; }
    .btn-remove {
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      width: 36px; height: 36px;
      font-size: 1.1rem;
      cursor: pointer;
      color: #a0aec0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .btn-remove:hover { border-color: #e53e3e; color: #e53e3e; }
    .btn-add {
      background: none;
      border: 1.5px dashed #cbd5e0;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      color: #718096;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s;
      margin-bottom: 1.25rem;
    }
    .btn-add:hover { border-color: #1a56db; color: #1a56db; }

    /* Dates row */
    .dates-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }
    .field input[type="date"] {
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      color: #1a202c;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input[type="date"]:focus { border-color: #1a56db; }

    /* Find button */
    .btn-find {
      width: 100%;
      background: #1a56db;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.9rem;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-find:hover:not(:disabled) { background: #1648bf; }
    .btn-find:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Results ── */
    .results-wrap {
      max-width: 900px;
      margin: 0 auto 3rem;
      padding: 0 1.25rem;
    }

    .spinner-wrap {
      text-align: center;
      padding: 3rem 1rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-wrap p { color: #718096; font-size: 1rem; }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      color: #c53030;
      text-align: center;
    }

    /* Destination cards */
    .dest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 1.25rem;
    }
    .dest-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .dest-card.best { box-shadow: 0 4px 20px rgba(26,86,219,0.2); border: 2px solid #1a56db; }

    .dest-header {
      background: linear-gradient(135deg, #1a56db 0%, #0e3a8a 100%);
      color: white;
      padding: 1.1rem 1.25rem 1rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .dest-header .city-name {
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1.1;
    }
    .dest-header .country {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 0.15rem;
    }
    .best-badge {
      background: #fbbf24;
      color: #78350f;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    .dest-stats {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .stat {
      flex: 1;
      padding: 0.9rem 1.1rem;
      border-right: 1px solid #f0f4f8;
    }
    .stat:last-child { border-right: none; }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #a0aec0; font-weight: 600; margin-bottom: 0.2rem; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: #1a202c; line-height: 1; }
    .stat-sub   { font-size: 0.75rem; color: #a0aec0; margin-top: 0.1rem; }

    .dest-body { padding: 1.1rem 1.25rem; }
    .dest-desc { font-size: 0.9rem; color: #4a5568; line-height: 1.5; margin-bottom: 0.6rem; }
    .dest-why  {
      font-size: 0.83rem;
      color: #718096;
      background: #f7fafc;
      border-left: 3px solid #1a56db;
      padding: 0.4rem 0.75rem;
      border-radius: 0 6px 6px 0;
      margin-bottom: 1rem;
      line-height: 1.45;
    }

    /* Breakdown table */
    .breakdown-toggle {
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      font-size: 0.83rem;
      font-weight: 600;
      color: #718096;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .breakdown-toggle:hover { border-color: #1a56db; color: #1a56db; }
    .breakdown-table {
      display: none;
      margin-top: 0.75rem;
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .breakdown-table.open { display: table; }
    .breakdown-table th {
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a0aec0;
      font-weight: 600;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid #f0f4f8;
    }
    .breakdown-table td {
      padding: 0.45rem 0.5rem;
      color: #4a5568;
      border-bottom: 1px solid #f0f4f8;
    }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table td:nth-child(3),
    .breakdown-table td:nth-child(4) { font-weight: 600; color: #1a202c; }

    @media (max-width: 500px) {
      .friend-row { grid-template-columns: 1fr 1fr auto; }
      .dest-grid  { grid-template-columns: 1fr; }
      .dates-row  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="back">← Home</a>
  <h1>✈️ Meet Me There</h1>
  <p>Find the perfect city for your group — best balance of price &amp; flight time</p>
</header>

<div class="form-wrap">
  <div class="form-card">
    <h2>Who's coming &amp; where from?</h2>

    <div class="friends-list" id="friendsList">
      <!-- rows injected by JS -->
    </div>
    <button class="btn-add" id="addFriendBtn" onclick="addFriend()">＋ Add another friend</button>

    <div class="dates-row">
      <div class="field">
        <label for="dateFrom">Travel from</label>
        <input type="date" id="dateFrom" />
      </div>
      <div class="field">
        <label for="dateTo">Travel to</label>
        <input type="date" id="dateTo" />
      </div>
    </div>

    <button class="btn-find" id="findBtn" onclick="findMeetingPoints()">Find Meeting Points</button>
  </div>
</div>

<div class="results-wrap" id="results"></div>

<script>
  let friendCount = 0;

  function addFriend(defaultName = '', defaultCity = '') {
    const list = document.getElementById('friendsList');
    if (list.children.length >= 8) return;

    const id = ++friendCount;
    const row = document.createElement('div');
    row.className = 'friend-row';
    row.dataset.id = id;
    row.innerHTML = `
      <input type="text" placeholder="Name (e.g. Alice)" value="${escAttr(defaultName)}" data-field="name" />
      <input type="text" placeholder="City (e.g. London)" value="${escAttr(defaultCity)}" data-field="city" />
      <button class="btn-remove" onclick="removeFriend(${id})" title="Remove">×</button>
    `;
    list.appendChild(row);

    if (list.children.length >= 8) {
      document.getElementById('addFriendBtn').style.display = 'none';
    }
  }

  function removeFriend(id) {
    const list = document.getElementById('friendsList');
    if (list.children.length <= 2) return; // keep at least 2
    const row = list.querySelector(`[data-id="${id}"]`);
    if (row) row.remove();
    document.getElementById('addFriendBtn').style.display = '';
  }

  function getFriends() {
    const rows = document.getElementById('friendsList').querySelectorAll('.friend-row');
    return Array.from(rows).map(row => ({
      name: row.querySelector('[data-field="name"]').value.trim(),
      city: row.querySelector('[data-field="city"]').value.trim(),
    }));
  }

  // ── Geo data: flight hours & costs from major cities to each destination ──
  const DESTINATIONS = [
    { city: 'Lisbon',    country: 'Portugal',     emoji: '🇵🇹', desc: 'Sun-drenched hills, trams, pastel de nata and world-class seafood.', why: 'Excellent budget connections from most of Europe and the Americas.' },
    { city: 'Amsterdam', country: 'Netherlands',  emoji: '🇳🇱', desc: 'Golden-age canals, world-class museums and a famously lively atmosphere.', why: 'Schiphol is one of the world\'s best-connected hubs — nearly everyone flies direct.' },
    { city: 'Barcelona', country: 'Spain',        emoji: '🇪🇸', desc: 'Gaudí architecture, beach, tapas and vibrant nightlife in one city.', why: 'Strong budget airline coverage and a destination that sells itself.' },
    { city: 'Prague',    country: 'Czechia',      emoji: '🇨🇿', desc: 'A fairy-tale old town, medieval castle and remarkably affordable prices.', why: 'Central European location keeps flight times short for most of the continent.' },
    { city: 'Dubai',     country: 'UAE',          emoji: '🇦🇪', desc: 'Iconic skyline, desert adventures and tax-free shopping in the desert sun.', why: 'Emirates hub means near-direct flights from every corner of the world.' },
    { city: 'Bangkok',   country: 'Thailand',     emoji: '🇹🇭', desc: 'Street food paradise, golden temples and some of the world\'s best nightlife.', why: 'Suvarnabhumi is the gateway to Asia — great value from East and West alike.' },
    { city: 'New York',  country: 'USA',          emoji: '🇺🇸', desc: 'The city that never sleeps — iconic skyline, food scene and endless energy.', why: 'Ideal meeting point for friends coming from both sides of the Atlantic.' },
    { city: 'Tokyo',     country: 'Japan',        emoji: '🇯🇵', desc: 'Unmatched food, cutting-edge culture and cherry blossoms in spring.', why: 'Worth the long haul — Haneda and Narita serve direct routes from across the globe.' },
  ];

  // [hours, £cost] from origin → destination (same order as DESTINATIONS array)
  const FLIGHT_DATA = {
    // city key (lowercase)  Lisbon  Amsterdam  Barcelona  Prague  Dubai  Bangkok  New York  Tokyo
    'london':      [[2.5,80],  [1.2,60],  [2.2,70],  [2.0,65],  [7.0,280],  [11.5,420], [7.5,350],  [11.5,580]],
    'paris':       [[2.5,80],  [1.5,70],  [2.0,75],  [2.0,80],  [6.5,270],  [11.5,420], [7.5,360],  [12.0,580]],
    'berlin':      [[3.0,90],  [1.5,60],  [2.5,75],  [1.0,50],  [6.5,260],  [11.0,400], [9.0,380],  [11.5,560]],
    'rome':        [[3.5,120], [2.5,100], [2.0,80],  [2.0,90],  [5.5,240],  [10.5,400], [9.0,420],  [12.0,580]],
    'madrid':      [[1.5,60],  [2.5,90],  [1.5,55],  [3.0,100], [6.5,270],  [12.0,430], [8.5,370],  [13.0,600]],
    'amsterdam':   [[2.5,90],  [0.0,0],   [2.5,80],  [1.5,65],  [7.0,250],  [11.5,410], [8.0,370],  [11.5,560]],
    'moscow':      [[5.5,250], [3.5,180], [5.0,230], [3.0,130], [4.5,200],  [9.0,360],  [10.0,500], [9.0,420]],
    'istanbul':    [[4.5,200], [3.5,160], [4.0,180], [3.0,140], [3.5,150],  [8.5,320],  [10.0,500], [11.0,480]],
    'cairo':       [[5.5,240], [4.5,220], [5.0,230], [4.5,200], [3.5,140],  [8.0,300],  [12.0,580], [11.0,500]],
    'new york':    [[7.0,380], [7.5,380], [7.5,400], [8.5,400], [12.0,600], [17.0,750], [0.0,0],    [14.0,700]],
    'toronto':     [[7.5,380], [8.0,380], [8.0,400], [9.0,400], [13.0,580], [19.0,750], [1.5,100],  [14.0,650]],
    'chicago':     [[9.0,450], [8.5,430], [9.0,450], [9.5,450], [13.0,600], [19.0,750], [2.0,120],  [13.0,620]],
    'miami':       [[8.5,420], [9.0,430], [9.0,440], [10.0,450],[14.0,620], [19.0,750], [3.0,160],  [15.5,700]],
    'los angeles': [[11.0,500],[10.0,450],[10.0,460],[11.0,470],[16.0,600], [17.0,650], [5.0,220],  [11.0,480]],
    'sao paulo':   [[9.5,450], [11.0,520],[11.0,530],[12.0,540],[15.0,680], [22.0,900], [10.0,500], [22.0,900]],
    'dubai':       [[7.0,280], [7.0,250], [6.5,260], [6.0,240], [0.0,0],    [6.0,220],  [13.0,580], [9.0,400]],
    'mumbai':      [[10.0,450],[9.0,400], [9.0,420], [9.0,380], [3.0,120],  [4.5,200],  [15.0,650], [9.5,450]],
    'singapore':   [[13.0,550],[12.0,500],[12.0,520],[12.0,510],[7.0,220],  [2.5,80],   [18.0,750], [7.0,280]],
    'hong kong':   [[13.0,580],[12.0,520],[13.0,550],[12.0,510],[8.0,320],  [2.5,80],   [16.0,680], [4.0,150]],
    'tokyo':       [[14.0,700],[11.5,600],[12.0,620],[11.5,600],[9.0,400],  [5.5,220],  [14.0,700], [0.0,0]],
    'sydney':      [[22.0,900],[21.0,800],[21.0,820],[22.0,820],[14.0,550], [9.0,350],  [21.0,800], [9.5,400]],
    'johannesburg':[[11.0,500],[11.0,480],[11.0,490],[11.0,490],[9.0,350],  [11.0,450], [16.0,700], [16.0,700]],
  };

  const DEST_KEYS = ['lisbon','amsterdam','barcelona','prague','dubai','bangkok','new york','tokyo'];

  function resolveCity(input) {
    const key = input.toLowerCase().trim();
    if (FLIGHT_DATA[key]) return key;
    // partial match
    for (const k of Object.keys(FLIGHT_DATA)) {
      if (key.includes(k) || k.includes(key)) return k;
    }
    // region fallbacks
    const eu = ['london','paris'];
    const us = ['new york'];
    if (/\b(uk|england|britain|scotland)\b/.test(key)) return 'london';
    if (/\b(us|usa|united states|america)\b/.test(key)) return 'new york';
    return 'london'; // default
  }

  function computeLocalResults(friends) {
    const scores = DESTINATIONS.map((dest, di) => {
      const perFriend = friends.map(f => {
        const hub  = resolveCity(f.city);
        const data = FLIGHT_DATA[hub]?.[di] ?? [8, 350];
        return { name: f.name, from: f.city, flightHours: data[0], estimatedCost: data[1] };
      });
      const totalCost     = perFriend.reduce((s, p) => s + p.estimatedCost, 0);
      const maxFlightHours = Math.max(...perFriend.map(p => p.flightHours));
      const avgFlightHours = perFriend.reduce((s, p) => s + p.flightHours, 0) / perFriend.length;
      // value score: penalise high cost and long max flight
      const costNorm  = Math.max(0, 100 - totalCost / (friends.length * 8));
      const timeNorm  = Math.max(0, 100 - maxFlightHours * 5);
      const valueScore = Math.round((costNorm * 0.5 + timeNorm * 0.5));
      return { city: dest.city, country: dest.country, countryEmoji: dest.emoji,
               totalCost, currency: 'GBP', maxFlightHours, avgFlightHours,
               valueScore, description: dest.desc, whyMeet: dest.why, perFriend };
    });
    scores.sort((a, b) => b.valueScore - a.valueScore);
    return scores.slice(0, 4);
  }

  async function findMeetingPoints() {
    const friends = getFriends();
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo   = document.getElementById('dateTo').value;

    for (const f of friends) {
      if (!f.name || !f.city) { showError('Please fill in every friend\'s name and city.'); return; }
    }
    if (!dateFrom || !dateTo) { showError('Please select travel dates.'); return; }

    const btn = document.getElementById('findBtn');
    btn.disabled = true;
    btn.textContent = 'Searching…';

    document.getElementById('results').innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p>Finding the best spots for your group…</p>
      </div>`;

    // Try live server first; fall back to local computation
    try {
      const res = await fetch('/api/meet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ friends, dateFrom, dateTo }),
      });
      if (res.ok) {
        const data = await res.json();
        renderResults(data.destinations || []);
        btn.disabled = false; btn.textContent = 'Find Meeting Points';
        return;
      }
    } catch { /* server not available — use local data */ }

    // Client-side fallback with indicative data
    renderResults(computeLocalResults(friends));
    btn.disabled = false;
    btn.textContent = 'Find Meeting Points';
  }

  function renderResults(destinations) {
    if (!destinations.length) {
      showError('No destinations found. Try different origins.');
      return;
    }

    const cards = destinations.map((d, i) => {
      const isBest = i === 0;
      const hours = d.maxFlightHours;
      const hDisplay = `${Math.floor(hours)}h ${Math.round((hours % 1) * 60)}m max`;
      const rows = (d.perFriend || []).map(p => `
        <tr>
          <td>${escHtml(p.name)}</td>
          <td>${escHtml(p.from)}</td>
          <td>£${p.estimatedCost}</td>
          <td>${p.flightHours}h</td>
        </tr>`).join('');

      return `
        <div class="dest-card ${isBest ? 'best' : ''}">
          <div class="dest-header">
            <div>
              <div class="city-name">${escHtml(d.countryEmoji || '')} ${escHtml(d.city)}</div>
              <div class="country">${escHtml(d.country)}</div>
            </div>
            ${isBest ? '<div class="best-badge">Best Value ✦</div>' : ''}
          </div>
          <div class="dest-stats">
            <div class="stat">
              <div class="stat-label">Total cost</div>
              <div class="stat-value">£${d.totalCost}</div>
              <div class="stat-sub">all friends</div>
            </div>
            <div class="stat">
              <div class="stat-label">Max flight</div>
              <div class="stat-value">${Math.floor(hours)}h ${Math.round((hours % 1)*60)}m</div>
              <div class="stat-sub">longest leg</div>
            </div>
            <div class="stat">
              <div class="stat-label">Value score</div>
              <div class="stat-value">${d.valueScore}</div>
              <div class="stat-sub">out of 100</div>
            </div>
          </div>
          <div class="dest-body">
            <div class="dest-desc">${escHtml(d.description)}</div>
            <div class="dest-why">${escHtml(d.whyMeet)}</div>
            <button class="breakdown-toggle" onclick="toggleBreakdown(this)">
              ▸ See per-person breakdown
            </button>
            <table class="breakdown-table">
              <thead>
                <tr>
                  <th>Friend</th><th>From</th><th>Est. Cost</th><th>Flight</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }).join('');

    document.getElementById('results').innerHTML = `<div class="dest-grid">${cards}</div>`;
  }

  function toggleBreakdown(btn) {
    const table = btn.nextElementSibling;
    const open  = table.classList.toggle('open');
    btn.textContent = open ? '▾ Hide breakdown' : '▸ See per-person breakdown';
  }

  function showError(msg) {
    document.getElementById('results').innerHTML = `<div class="error-box">${escHtml(msg)}</div>`;
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) {
    return String(str ?? '').replace(/"/g, '&quot;');
  }

  // Set default dates (today + 30 days)
  const today = new Date();
  const later = new Date(today); later.setDate(later.getDate() + 30);
  const fmt   = d => d.toISOString().split('T')[0];
  document.getElementById('dateFrom').value = fmt(today);
  document.getElementById('dateTo').value   = fmt(later);

  // Start with 2 friend rows
  addFriend('', '');
  addFriend('', '');
</script>

</body>
</html>
