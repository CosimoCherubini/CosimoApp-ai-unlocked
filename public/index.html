<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel AI — Explore Your Destination</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a56db 0%, #0e3a8a 100%);
      color: white;
      text-align: center;
      padding: 3rem 1rem 4rem;
    }
    header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    header p  { font-size: 1.1rem; opacity: 0.85; }

    /* ── Search box ── */
    .search-wrapper {
      display: flex;
      justify-content: center;
      margin: -1.75rem auto 2.5rem;
      padding: 0 1rem;
      max-width: 560px;
    }
    .search-box {
      display: flex;
      width: 100%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 1rem 1.25rem;
      font-size: 1.05rem;
      color: #1a202c;
    }
    .search-box input::placeholder { color: #a0aec0; }
    .search-box button {
      background: #1a56db;
      color: white;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-box button:hover  { background: #1648bf; }
    .search-box button:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Main content area ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* ── State messages ── */
    .state-message {
      text-align: center;
      padding: 3rem 1rem;
      color: #718096;
    }
    .state-message .icon  { font-size: 3rem; margin-bottom: 1rem; }
    .state-message h2     { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; color: #4a5568; }
    .state-message p      { font-size: 1rem; }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      color: #c53030;
      max-width: 560px;
      margin: 1rem auto;
      text-align: center;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      text-align: center;
      padding: 3rem 1rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-wrap p { color: #718096; font-size: 1rem; }

    /* ── City heading ── */
    .city-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .city-heading h2 {
      font-size: 2rem;
      font-weight: 800;
      color: #1a56db;
    }
    .city-heading p {
      color: #718096;
      margin-top: 0.25rem;
    }

    /* ── Results grid ── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* ── Category card ── */
    .category-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.1rem 1.25rem;
      font-weight: 700;
      font-size: 1.05rem;
      color: white;
    }
    .category-header .icon { font-size: 1.4rem; }

    .category-header.activities  { background: #1a56db; }
    .category-header.restaurants { background: #d97706; }
    .category-header.walks       { background: #059669; }

    /* ── Item list ── */
    .item-list { padding: 0.5rem 0; }
    .item {
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid #f0f4f8;
    }
    .item:last-child { border-bottom: none; }

    .item-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: #1a202c;
      margin-bottom: 0.2rem;
    }
    .item-meta {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
    }
    .item-meta.cuisine  { color: #d97706; }
    .item-meta.distance { color: #059669; }

    .item-description {
      font-size: 0.88rem;
      color: #4a5568;
      line-height: 1.45;
      margin-bottom: 0.4rem;
    }
    .item-tip {
      font-size: 0.82rem;
      color: #718096;
      background: #f7fafc;
      border-left: 3px solid #cbd5e0;
      padding: 0.3rem 0.6rem;
      border-radius: 0 4px 4px 0;
    }
    .item-tip::before { content: "Tip: "; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <h1>Where to next?</h1>
    <p>Enter a city and discover the best things to do, eat, and explore</p>
  </header>

  <div class="search-wrapper">
    <div class="search-box">
      <input
        type="text"
        id="cityInput"
        placeholder="e.g. London, Tokyo, Barcelona..."
        autocomplete="off"
      />
      <button id="exploreBtn" onclick="explore()">Explore</button>
    </div>
  </div>

  <main id="main">
    <div class="state-message">
      <div class="icon">🗺️</div>
      <h2>Discover your destination</h2>
      <p>Type any city above to get personalised AI-powered recommendations</p>
    </div>
  </main>

  <script>
    const input = document.getElementById('cityInput');
    const btn   = document.getElementById('exploreBtn');
    const main  = document.getElementById('main');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') explore();
    });

    async function explore() {
      const city = input.value.trim();
      if (!city) {
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Searching...';
      showSpinner(city);

      try {
        const res  = await fetch('/api/explore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ city }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Something went wrong. Please try again.');
          return;
        }

        renderResults(data);
      } catch (err) {
        showError('Could not reach the server. Make sure it is running.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Explore';
      }
    }

    function showSpinner(city) {
      main.innerHTML = `
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <p>Finding the best of <strong>${escHtml(city)}</strong>…</p>
        </div>`;
    }

    function showError(msg) {
      main.innerHTML = `<div class="error-box">${escHtml(msg)}</div>`;
    }

    function renderResults(data) {
      main.innerHTML = `
        <div class="city-heading">
          <h2>${escHtml(data.city)}</h2>
          <p>Here's what we recommend</p>
        </div>
        <div class="results-grid">
          ${renderCard('activities',  '🏛️',  'Things To Do',      data.activities,  renderActivity)}
          ${renderCard('restaurants', '🍽️',  'Where To Eat',      data.restaurants, renderRestaurant)}
          ${renderCard('walks',       '🌿',  'Walks & Runs',      data.walks,       renderWalk)}
        </div>`;
    }

    function renderCard(type, icon, title, items, renderItem) {
      return `
        <div class="category-card">
          <div class="category-header ${type}">
            <span class="icon">${icon}</span>
            <span>${title}</span>
          </div>
          <div class="item-list">
            ${(items || []).map(renderItem).join('')}
          </div>
        </div>`;
    }

    function renderActivity(item) {
      return `
        <div class="item">
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-description">${escHtml(item.description)}</div>
          <div class="item-tip">${escHtml(item.tip)}</div>
        </div>`;
    }

    function renderRestaurant(item) {
      return `
        <div class="item">
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-meta cuisine">${escHtml(item.cuisine)}</div>
          <div class="item-description">${escHtml(item.description)}</div>
          <div class="item-tip">${escHtml(item.tip)}</div>
        </div>`;
    }

    function renderWalk(item) {
      return `
        <div class="item">
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-meta distance">${escHtml(item.distance)}</div>
          <div class="item-description">${escHtml(item.description)}</div>
          <div class="item-tip">${escHtml(item.tip)}</div>
        </div>`;
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
